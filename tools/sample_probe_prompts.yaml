# Fixed prompt set for legacy_textonly_d22_r30_internal_baseline sample probes.
# Cadence: emit sample packs every ~5000 steps.
#
# These prompts are designed to surface:
#   - style-register by source family (Victorian, newspaper, science, legal)
#   - cutoff behavior (1913 cutoff) on post-cutoff entities
#   - calibration failure modes (confident fabrication of post-cutoff facts)
#
# None of these outputs are evidence of "governed" behavior. They are baseline
# samples from a text-only shard set with no source IDs. Label every output
# "legacy/internal/baseline".

categories:

